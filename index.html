<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 재난문자 모니터링</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard-dynamic-subset.css">
    
    <style>
        :root {
            --primary-color: #d32f2f;
            --secondary-color: #004a99;
            --bg-color: #f8f9fa;
            --border-color: #dee2e6;
            --text-main: #212529;
            --text-sub: #6c757d;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        /* Header & Info Bar */
        .header {
            border-bottom: 2px solid var(--text-main);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .total-count b {
            color: var(--secondary-color);
            font-weight: 700;
        }

        /* Table Design */
        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th {
            background-color: #f1f3f5;
            padding: 12px;
            font-size: 13px;
            font-weight: 600;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 16px 12px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
            text-align: center;
            line-height: 1.5;
        }

        tr:hover td {
            background-color: #f9fbff;
        }

        /* Column Styles */
        .col-type {
            font-weight: 700;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .col-content {
            text-align: left;
            word-break: keep-all;
        }

        .region-tag {
            color: var(--secondary-color);
            font-weight: 700;
            margin-left: 5px;
        }

        .new-badge {
            background: var(--secondary-color);
            color: #fff;
            font-size: 10px;
            padding: 2px 4px;
            border-radius: 3px;
            margin-left: 5px;
            vertical-align: middle;
        }

        .col-date {
            color: var(--text-sub);
            font-size: 13px;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 30px;
        }

        .nav-btn {
            background-color: #fff;
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: 0.2s;
        }

        .nav-btn:hover:not(:disabled) {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }

        .nav-btn:disabled {
            color: #ccc;
            cursor: not-allowed;
        }

        .page-info {
            font-weight: 700;
            font-size: 14px;
        }

        /* Mobile View */
        @media (max-width: 768px) {
            .col-date { display: none; }
            th:nth-child(3) { display: none; }
            .container { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🚨 실시간 재난문자 발령 현황</h1>
    </div>

    <div class="info-bar">
        <div class="total-count">총 <b id="totalCount">0</b>건의 게시물이 검색되었습니다.</div>
        <div style="color: var(--text-sub);">등록일순 ▽</div>
    </div>

    <table>
        <thead>
            <tr>
                <th style="width: 130px;">재해구분명</th> <th>제목 (지역)</th>
                <th style="width: 180px;">등록일</th>
            </tr>
        </thead>
        <tbody id="list">
            <tr><td colspan="3" style="padding:100px; color:var(--text-sub);">데이터를 불러오는 중입니다...</td></tr>
        </tbody>
    </table>

    <div class="pagination">
        <button id="btnPrev" class="nav-btn" onclick="changePage(-1)">이전 페이지</button>
        <span id="pageDisplay" class="page-info">1 / 1</span>
        <button id="btnNext" class="nav-btn" onclick="changePage(1)">다음 페이지</button>
    </div>
</div>

<script>
    let curr = 1, last = 1;

    // Hàm load dữ liệu từ API Server của bạn
    async function loadData(page = 1) {
        const tbody = document.getElementById('list');
        try {
            const res = await fetch(`/api/safety?page=${page}`);
            const data = await res.json();
            
            curr = data.currentPage;
            last = data.lastPage;

            document.getElementById('totalCount').innerText = data.totalCount.toLocaleString();
            document.getElementById('pageDisplay').innerText = `${curr} / ${last}`;
            document.getElementById('btnPrev').disabled = (curr <= 1);
            document.getElementById('btnNext').disabled = (curr >= last);

            tbody.innerHTML = data.items.map(item => `
                <tr>
                    <td>
                        <div class="col-type">
                            <span>${item.displayIcon || '⚠️'}</span>
                            ${item.DST_SE_NM} </div>
                    </td>
                    <td class="col-content">
                        ${item.MSG_CN} 
                        <span class="region-tag">[${item.RCPTN_RGN_NM}]</span>
                        <span class="new-badge">N</span>
                    </td>
                    <td class="col-date">${item.CRT_DT}</td>
                </tr>
            `).join('');

        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="3" style="padding:50px; color:red;">데이터 로드 중 오류가 발생했습니다.</td></tr>';
        }
    }

    function changePage(step) {
        const target = curr + step;
        if(target >= 1 && target <= last) {
            loadData(target);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    window.onload = () => loadData(1);
</script>

</body>
</html>
